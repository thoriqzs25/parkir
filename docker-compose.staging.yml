version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: parkir-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: parkir
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: parkir_staging
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
      - ./backups:/var/backups/parkir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkir"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: parkir-backend-staging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: staging
      PORT: 8080
      DATABASE_URL: postgres://parkir:${DB_PASSWORD:?}@postgres:5432/parkir_staging?sslmode=disable
      LOG_LEVEL: debug
      FRONTEND_URL: https://${DASHBOARD_DOMAIN:?DASHBOARD_DOMAIN is required}
      MIGRATIONS_PATH: migrations
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      BACKUP_DIR: /var/backups/parkir
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./keys:/app/keys:ro
      - ./backups:/var/backups/parkir

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: parkir-dashboard-staging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:?API_DOMAIN is required}

  nginx:
    image: nginx:1.27-alpine
    container_name: parkir-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - dashboard
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: parkir-certbot-staging
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./nginx/ssl:/etc/nginx/ssl
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; cp -L /etc/letsencrypt/live/*/fullchain.pem /etc/nginx/ssl/cert.pem 2>/dev/null; cp -L /etc/letsencrypt/live/*/privkey.pem /etc/nginx/ssl/key.pem 2>/dev/null; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data_staging: