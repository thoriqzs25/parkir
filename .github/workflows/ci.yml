name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parkir_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download Go dependencies
        working-directory: ./backend
        run: go mod download

      - name: Build backend
        working-directory: ./backend
        run: go build ./...

      - name: Run backend tests
        working-directory: ./backend
        env:
          PARKIR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/parkir_test?sslmode=disable
        run: go test ./... -count=1

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Type check dashboard
        working-directory: ./dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        working-directory: ./dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build desktop
        working-directory: ./desktop
        run: npm run build
